name: Daily market review email

# 工作日北京 20:30：DeepSeek 完整复盘（同本地模板）→ 发邮
# 需 Secrets: DEEPSEEK_API_KEY + SMTP_* / EMAIL_*

on:
  schedule:
    - cron: "30 12 * * 1-5"
  workflow_dispatch:
    inputs:
      trade_date:
        description: "交易日 YYYYMMDD（可空=当天上海日期）"
        required: false
        default: ""

jobs:
  review-and-email:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve trade date (Asia/Shanghai)
        id: d
        env:
          INPUT_DATE: ${{ github.event.inputs.trade_date }}
        run: |
          if [ -n "$INPUT_DATE" ]; then
            echo "date=$INPUT_DATE" >> "$GITHUB_OUTPUT"
          else
            echo "date=$(TZ=Asia/Shanghai date +%Y%m%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate DeepSeek full review
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          set -e
          DATE="${{ steps.d.outputs.date }}"
          STAMP="${DATE:0:4}-${DATE:4:2}-${DATE:6:2}"
          export DEEPSEEK_BASE_URL="${DEEPSEEK_BASE_URL:-https://api.deepseek.com}"
          export DEEPSEEK_MODEL="${DEEPSEEK_MODEL:-deepseek-chat}"
          if [ -z "${DEEPSEEK_API_KEY:-}" ] && [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "No DEEPSEEK_API_KEY; writing quantitative fallback."
            python3 scripts/generate_daily_quant_review.py --date "$DATE"
            echo "primary=A股盘面复盘_${STAMP}_定量.md" >> "$GITHUB_ENV"
          else
            python3 scripts/generate_llm_review.py --date "$DATE"
            echo "primary=A股盘面复盘_${STAMP}.md" >> "$GITHUB_ENV"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: market-review-${{ steps.d.outputs.date }}
          path: |
            A股盘面复盘_*.md
          if-no-files-found: error

      - name: Send email
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_SSL: ${{ secrets.SMTP_SSL }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_FROM_NAME: ${{ secrets.EMAIL_FROM_NAME }}
        run: |
          set -e
          test -n "${primary:-}"
          test -f "$primary"
          if [ -z "${SMTP_USER:-}" ] || [ -z "${SMTP_PASS:-}" ] || [ -z "${EMAIL_TO:-}" ]; then
            echo "SMTP secrets missing; skip email."
            exit 0
          fi
          export SMTP_HOST="${SMTP_HOST:-smtp.163.com}"
          export SMTP_PORT="${SMTP_PORT:-465}"
          export SMTP_SSL="${SMTP_SSL:-true}"
          python3 scripts/send_report_email.py "$primary" \
            --subject "A股盘面复盘 $(basename "$primary" .md | sed 's/A股盘面复盘_//')" \
            --body "DeepSeek 自动复盘（模板对齐本地 Agent）。仅供研究，不构成投资建议。"
