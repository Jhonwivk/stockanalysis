name: Daily market review

on:
  schedule:
    - cron: "30 12 * * 1-5"   # weekdays 20:30 Asia/Shanghai
  workflow_dispatch:
    inputs:
      trade_date:
        description: "YYYYMMDD (empty = today Shanghai)"
        required: false
        default: ""

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf-2.0-0 libffi-dev shared-mime-info
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Resolve date
        id: d
        env:
          INPUT_DATE: ${{ github.event.inputs.trade_date }}
        run: |
          if [ -n "$INPUT_DATE" ]; then
            echo "date=$INPUT_DATE" >> "$GITHUB_OUTPUT"
          else
            echo "date=$(TZ=Asia/Shanghai date +%Y%m%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate PDF
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          set -e
          DATE="${{ steps.d.outputs.date }}"
          STAMP="${DATE:0:4}-${DATE:4:2}-${DATE:6:2}"
          mkdir -p output
          export DEEPSEEK_BASE_URL="${DEEPSEEK_BASE_URL:-https://api.deepseek.com}"
          export DEEPSEEK_MODEL="${DEEPSEEK_MODEL:-deepseek-chat}"
          if [ -z "${DEEPSEEK_API_KEY:-}" ] && [ -z "${OPENAI_API_KEY:-}" ]; then
            MD="output/A股盘面复盘_${STAMP}_定量.md"
            python3 scripts/generate_quant_review.py --date "$DATE" -o "$MD"
          else
            MD="output/A股盘面复盘_${STAMP}.md"
            python3 scripts/generate_llm_review.py --date "$DATE" -o "$MD"
          fi
          PDF="output/A股盘面复盘_${STAMP}.pdf"
          python3 scripts/md_to_pdf.py "$MD" -o "$PDF"
          rm -f "$MD"
          echo "pdf=$PDF" >> "$GITHUB_ENV"

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: market-review-${{ steps.d.outputs.date }}
          path: output/A股盘面复盘_*.pdf
          if-no-files-found: error

      - name: Email PDF
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_SSL: ${{ secrets.SMTP_SSL }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_FROM_NAME: ${{ secrets.EMAIL_FROM_NAME }}
        run: |
          set -e
          test -f "$pdf"
          if [ -z "${SMTP_USER:-}" ] || [ -z "${SMTP_PASS:-}" ] || [ -z "${EMAIL_TO:-}" ]; then
            echo "SMTP not configured; skip email."
            exit 0
          fi
          export SMTP_HOST="${SMTP_HOST:-smtp.163.com}"
          export SMTP_PORT="${SMTP_PORT:-465}"
          export SMTP_SSL="${SMTP_SSL:-true}"
          python3 scripts/send_email.py "$pdf" \
            --subject "A股盘面复盘 $(basename "$pdf" .pdf | sed 's/A股盘面复盘_//')" \
            --body "附件为 PDF 复盘。仅供研究，不构成投资建议。"
